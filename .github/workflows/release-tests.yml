name: Release Tests

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 全テスト（#[ignore]含む）をクロスプラットフォームで実行
  full-test:
    name: Full Tests (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      - name: Build
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Run all tests (including slow tests)
        run: cargo test --verbose --target ${{ matrix.target }} -- --include-ignored
        timeout-minutes: 30
        env:
          RUST_TEST_THREADS: 1

      - name: Test Summary
        if: always()
        run: |
          echo "::notice::All tests completed for ${{ matrix.os }}"

  # すべてのテストが成功したことを確認
  release-ready:
    name: Release Ready
    needs: full-test
    runs-on: ubuntu-latest
    steps:
      - name: All tests passed
        run: |
          echo "✓ All platform tests passed successfully"
          echo "::notice::Ready for release build"
