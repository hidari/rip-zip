name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary
        shell: bash
        run: |
          binary_name="rip${{ matrix.suffix }}"
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../../rip-zip-${{ matrix.target }}.zip $binary_name
          else
            zip ../../../rip-zip-${{ matrix.target }}.zip $binary_name
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: rip-zip-${{ matrix.target }}.zip
          generate_release_notes: true

  publish-crate:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in Cargo.toml
        run: |
          for toml in crates/rip-core/Cargo.toml crates/rip-adapters/Cargo.toml crates/rip-cli/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.VERSION }}\"/" "$toml"
          done

      - name: Commit version update
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git diff --quiet crates/*/Cargo.toml || (
            git add crates/*/Cargo.toml
            git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          )

      - name: Publish to crates.io
        run: cargo publish -p rip-zip --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  notify-homebrew:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew Formula Update
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'hidari',
              repo: 'homebrew-tap',
              event_type: 'update-formula',
              client_payload: {
                formula: 'rip',
                version: context.ref.replace('refs/tags/', '')
              }
            });
