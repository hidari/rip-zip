name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary
        shell: bash
        run: |
          binary_name="rip${{ matrix.suffix }}"
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../../rip-zip-${{ matrix.target }}.zip $binary_name
          else
            zip ../../../rip-zip-${{ matrix.target }}.zip $binary_name
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: sha256sum rip-zip-${{ matrix.target }}.zip > rip-zip-${{ matrix.target }}.zip.sha256

      - name: Upload Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            rip-zip-${{ matrix.target }}.zip
            rip-zip-${{ matrix.target }}.zip.sha256
          generate_release_notes: true

  notify-homebrew:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew Formula Update
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'hidari',
              repo: 'homebrew-tap',
              event_type: 'update-formula',
              client_payload: {
                formula: 'rip',
                version: context.ref.replace('refs/tags/', '')
              }
            });
