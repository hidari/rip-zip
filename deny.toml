# cargo-deny ポリシー設定
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

# 脆弱性チェック（RustSec advisory DB）
[advisories]
ignore = []

# ライセンスチェック
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MIT-0",
    "bzip2-1.0.6",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true
registries = []

# 重複クレートチェック
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# ソースチェック
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
